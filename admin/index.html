<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Phone - Phone Management</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bgDark: '#1e1e24',
            tableHeader: '#5c6794',
            footerTop: '#1d1b4c',
            footerBottom: '#511845',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen antialiased">

  <nav class="bg-bgDark border-b border-gray-800 shadow-sm py-2">
    <div class="container mx-auto px-4 flex justify-between items-center">
      <a href="#" class="flex items-center gap-2 text-white font-bold text-xl">
        <i class="fa-solid fa-mobile"></i> Cyber Phone
      </a>
      <div class="flex gap-6">
        <a href="#" class="text-white flex flex-col items-center text-xs hover:text-gray-300">
          <i class="fa-solid fa-house text-lg mb-1"></i> Home
        </a>
        <a href="#" class="text-white flex flex-col items-center text-xs hover:text-gray-300">
          <i class="fa-solid fa-store text-lg mb-1"></i> Store
        </a>
        <a href="#" class="text-white flex flex-col items-center text-xs hover:text-gray-300 relative">
          <i class="fa-solid fa-cart-shopping text-lg mb-1"></i> Cart
        </a>
      </div>
    </div>
  </nav>

  <main class="container mx-auto px-4 my-10 flex-grow">
    <div class="bg-white rounded-lg shadow-md overflow-hidden border border-gray-200">
      
      <div class="bg-tableHeader p-5 flex justify-between items-center flex-wrap gap-4">
        <h3 class="text-white text-xl font-bold">Phone Management</h3>
        <button data-modal-target="addPhoneModal" data-modal-toggle="addPhoneModal" class="bg-bgDark hover:bg-black text-white px-4 py-2.5 rounded-lg text-sm font-medium flex items-center gap-2 transition shadow" type="button">
          <i class="fa-solid fa-circle-plus"></i> Add Phone
        </button>
      </div>

      <div class="p-4 bg-gray-50 flex flex-wrap gap-4 items-center justify-between border-b border-gray-200">
        <div class="relative w-full sm:w-72">
          <input type="text" id="searchPhone" class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" placeholder="Search phone by name...">
        </div>
        <div class="w-full sm:w-48">
          <select id="sortPrice" class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5">
            <option value="">Sort by Price</option>
            <option value="asc">Low to High</option>
            <option value="desc">High to Low</option>
          </select>
        </div>
      </div>
      
      <div class="overflow-x-auto">
        <table class="w-full text-sm text-center text-gray-500 whitespace-nowrap">
          <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b border-gray-200">
            <tr>
              <th scope="col" class="px-6 py-4">#</th>
              <th scope="col" class="px-6 py-4">Name</th>
              <th scope="col" class="px-6 py-4">Price</th>
              <th scope="col" class="px-6 py-4">Photo</th>
              <th scope="col" class="px-6 py-4">Description</th>
              <th scope="col" class="px-6 py-4"><i class="fa-solid fa-gear mr-1"></i> Action</th>
            </tr>
          </thead>
          <tbody id="tablePhone"></tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="bg-gradient-to-b from-footerTop via-footerTop to-footerBottom text-gray-300 pt-6 pb-4 mt-auto">
    <div class="container mx-auto px-4 border-b border-gray-700 pb-4 mb-6 flex justify-between items-center flex-wrap gap-3 text-sm">
      <span>Get connected with us on social networks:</span>
      <div class="flex gap-4 text-lg text-white">
        <a href="#" class="hover:text-gray-400"><i class="fa-brands fa-facebook"></i></a>
        <a href="#" class="hover:text-gray-400"><i class="fa-brands fa-twitter"></i></a>
        <a href="#" class="hover:text-gray-400"><i class="fa-brands fa-google"></i></a>
      </div>
    </div>
    <div class="container mx-auto px-4 text-center text-xs text-gray-500">
      &copy; 2026 Cyber Phone Management. All rights reserved.
    </div>
  </footer>

  <div id="addPhoneModal" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
    <div class="relative p-4 w-full max-w-md max-h-full">
      <div class="relative bg-gradient-to-br from-red-50 to-slate-100 rounded-2xl shadow-2xl p-6 border border-white">
        
        <div class="text-center mb-6">
          <h2 class="text-3xl font-serif text-gray-600 tracking-wide">Phone Info</h2>
        </div>

        <form id="phoneForm" class="space-y-3.5">
          <div class="flex flex-col">
            <div class="flex rounded-lg shadow-sm">
              <span class="px-4 inline-flex items-center bg-gray-200 border border-r-0 border-gray-300 rounded-l-lg text-gray-600 w-12 justify-center">
                <i class="fa-solid fa-mobile-screen-button"></i>
              </span>
              <input type="text" id="name" class="rounded-none rounded-r-lg bg-white border border-gray-300 text-gray-900 block flex-1 min-w-0 w-full text-sm p-2.5 focus:outline-none" placeholder="Phone name">
            </div>
            <span id="tbName" class="text-red-500 text-xs mt-1 hidden"></span>
          </div>

          <div class="flex flex-col">
            <div class="flex rounded-lg shadow-sm">
              <span class="px-4 inline-flex items-center bg-gray-200 border border-r-0 border-gray-300 rounded-l-lg text-gray-600 w-12 justify-center">
                <i class="fa-solid fa-dollar-sign"></i>
              </span>
              <input type="text" id="price" class="rounded-none rounded-r-lg bg-white border border-gray-300 text-gray-900 block flex-1 min-w-0 w-full text-sm p-2.5 focus:outline-none" placeholder="Price">
            </div>
            <span id="tbPrice" class="text-red-500 text-xs mt-1 hidden"></span>
          </div>

          <div class="flex flex-col">
            <div class="flex rounded-lg shadow-sm">
              <span class="px-4 inline-flex items-center bg-gray-200 border border-r-0 border-gray-300 rounded-l-lg text-gray-600 w-12 justify-center">
                <i class="fa-solid fa-mobile-button"></i>
              </span>
              <input type="text" id="screen" class="rounded-none rounded-r-lg bg-white border border-gray-300 text-gray-900 block flex-1 min-w-0 w-full text-sm p-2.5 focus:outline-none" placeholder="Screen size">
            </div>
            <span id="tbScreen" class="text-red-500 text-xs mt-1 hidden"></span>
          </div>

          <div class="flex flex-col">
            <div class="flex rounded-lg shadow-sm">
              <span class="px-4 inline-flex items-center bg-gray-200 border border-r-0 border-gray-300 rounded-l-lg text-gray-600 w-12 justify-center">
                <i class="fa-solid fa-camera"></i>
              </span>
              <input type="text" id="backCamera" class="rounded-none rounded-r-lg bg-white border border-gray-300 text-gray-900 block flex-1 min-w-0 w-full text-sm p-2.5 focus:outline-none" placeholder="Back Camera info">
            </div>
            <span id="tbBCam" class="text-red-500 text-xs mt-1 hidden"></span>
          </div>

          <div class="flex flex-col">
            <div class="flex rounded-lg shadow-sm">
              <span class="px-4 inline-flex items-center bg-gray-200 border border-r-0 border-gray-300 rounded-l-lg text-gray-600 w-12 justify-center">
                <i class="fa-solid fa-camera"></i>
              </span>
              <input type="text" id="frontCamera" class="rounded-none rounded-r-lg bg-white border border-gray-300 text-gray-900 block flex-1 min-w-0 w-full text-sm p-2.5 focus:outline-none" placeholder="Front Camera info">
            </div>
            <span id="tbFCam" class="text-red-500 text-xs mt-1 hidden"></span>
          </div>

          <div class="flex flex-col">
            <div class="flex rounded-lg shadow-sm">
              <span class="px-4 inline-flex items-center bg-gray-200 border border-r-0 border-gray-300 rounded-l-lg text-gray-600 w-12 justify-center">
                <i class="fa-solid fa-link"></i>
              </span>
              <input type="text" id="img" class="rounded-none rounded-r-lg bg-white border border-gray-300 text-gray-900 block flex-1 min-w-0 w-full text-sm p-2.5 focus:outline-none" placeholder="Image link URL">
            </div>
            <span id="tbImg" class="text-red-500 text-xs mt-1 hidden"></span>
          </div>

          <div class="flex flex-col">
            <div class="flex rounded-lg shadow-sm">
              <span class="px-4 inline-flex items-center bg-gray-200 border border-r-0 border-gray-300 rounded-l-lg text-gray-600 w-12 justify-center">
                <i class="fa-solid fa-comment"></i>
              </span>
              <input type="text" id="desc" class="rounded-none rounded-r-lg bg-white border border-gray-300 text-gray-900 block flex-1 min-w-0 w-full text-sm p-2.5 focus:outline-none" placeholder="Description">
            </div>
            <span id="tbDesc" class="text-red-500 text-xs mt-1 hidden"></span>
          </div>

          <div class="flex flex-col">
            <div class="flex rounded-lg shadow-sm">
              <span class="px-4 inline-flex items-center bg-gray-200 border border-r-0 border-gray-300 rounded-l-lg text-gray-600 w-12 justify-center">
                <i class="fa-solid fa-signature"></i>
              </span>
              <select id="brand" class="rounded-none rounded-r-lg bg-white border border-gray-300 text-gray-900 block flex-1 min-w-0 w-full text-sm p-2.5 focus:outline-none">
                <option value="" selected disabled>Select brand</option>
                <option value="iphone">iPhone</option>
                <option value="samsung">Samsung</option>
                <option value="samsung">Xiaomi</option>
                <option value="samsung">Oppo</option>
              </select>
            </div>
            <span id="tbBrand" class="text-red-500 text-xs mt-1 hidden"></span>
          </div>

          <div class="flex justify-end gap-2 pt-2">
            <button type="submit" class="text-white bg-[#f1b400] hover:bg-yellow-600 font-medium rounded-lg text-sm px-5 py-2.5 transition shadow">Add Phone</button>
            <button data-modal-hide="addPhoneModal" type="button" class="text-white bg-[#2c3e50] hover:bg-slate-800 font-medium rounded-lg text-sm px-5 py-2.5 transition shadow">Close</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>
  
  <script type="module" src="./js/main.js"></script>
</body>
</html>
